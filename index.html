<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For My Love ❤️</title>
<style>
body{
  margin:0;
  padding:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ff758c,#ff7eb3);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
  color:white;
}

.box{
  background: rgba(0,0,0,0.5);
  padding:40px;
  border-radius:20px;
  width:90%;
  max-width:400px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:25px;
  margin:10px;
  font-size:16px;
  cursor:pointer;
}

#yes{
  background:#00ff99;
}

#no{
  background:#ff4d4d;
  position:relative;
}
</style>
</head>

<body>

<div class="box">
  <h1>I'm Sorry 🥺</h1>
  <p id="msg"></p>
  <button id="yes" onclick="love()">Okay ❤️</button>
  <button id="no">No 😒</button>
</div>

<script>

let text = "Tui amar shobcheye important manus. Vul hoye gese, kintu amar bhalobasha real. Rag koris na please ❤️";
let i=0;

function typing(){
  if(i < text.length){
    document.getElementById("msg").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing,40);
  }
}
typing();

function love(){
  document.querySelector(".box").innerHTML =
  "<h1>Yaaay 😍</h1><p>Thank you for forgiving me ❤️</p>";
}

let noBtn=document.getElementById("no");
noBtn.addEventListener("mouseover",function(){
  noBtn.style.position="absolute";
  noBtn.style.left=Math.random()*70+"%";
  noBtn.style.top=Math.random()*70+"%";
});

</script>

</body>
</html>
