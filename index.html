<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Our Story ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<style>
body{
    margin:0;
    padding:0;
    font-family:'Poppins',sans-serif;
    background:black;
    color:white;
    overflow:hidden;
}

#intro{
    position:absolute;
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:black;
    text-align:center;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    font-size:16px;
    cursor:pointer;
    background:#ff2e63;
    color:white;
    margin-top:20px;
}

#main{
    display:none;
    height:100vh;
    background:linear-gradient(135deg,#141e30,#243b55);
    text-align:center;
    padding-top:80px;
}

h1{
    font-size:32px;
    margin-bottom:20px;
}

p{
    width:80%;
    margin:auto;
    font-size:18px;
    line-height:28px;
}
</style>
</head>

<body>

<div id="intro">
    <h1>Hey… 🥺</h1>
    <p>I made something for you...</p>
    <button onclick="start()">Click Here ❤️</button>
</div>

<div id="main">
    <h1>Our Story 🌙</h1>
    <p id="text"></p>
    <button onclick="forgive()">Will You Forgive Me? 💕</button>
</div>

<audio id="music" loop>
<source src="https://www2.cs.uic.edu/~i101/SoundFiles/StarWars60.wav" type="audio/wav">
</audio>

<script>

let story = "Amader prothom kotha bola ta mone ase? 🥰 Shei din thekei amar duniya ta change hoye gese... Tui amar shanti, amar hasi, amar pagolami shob kichu ❤️ Kichu vul hoye gese, but amar bhalobasha konodin kombe na. Ami sudhu toke chai, ar kichu na 🥺";

let i=0;

function start(){
    document.getElementById("intro").style.display="none";
    document.getElementById("main").style.display="block";
    document.getElementById("music").play();
    typeWriter();
}

function typeWriter(){
    if(i < story.length){
        document.getElementById("text").innerHTML += story.charAt(i);
        i++;
        setTimeout(typeWriter,40);
    }
}

function forgive(){
    document.getElementById("main").innerHTML =
    "<h1>Thank You ❤️</h1><p>Ami promise kortesi, aar kokhono toke kosto dibo na. Tui amar forever 🌎</p>";
}

</script>

</body>
</html>}

button{
    padding:10px 20px;
    border:none;
    border-radius:20px;
    margin:10px;
    font-size:16px;
    cursor:pointer;
}

#yes{
    background:#00ff88;
}

#no{
    background:#ff4d4d;
    position:relative;
}
</style>
</head>

<body>

<div class="box">
    <h1 id="title">Hey Beautiful 🥺</h1>
    <p id="message"></p>

    <button id="yes" onclick="forgive()">Okay, I Forgive You ❤️</button>
    <button id="no">No 😒</button>
</div>

<script>

let text = "Tui amar shobcheye special manus... Amar din, amar mood, amar shob kichu tor upor depend kore. Rag koris na please 🥺 Ami chara tui parbi, kintu ami tor chara parbo na ❤️";
let i=0;

function typeEffect(){
    if(i < text.length){
        document.getElementById("message").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect,40);
    }
}
typeEffect();

function forgive(){
    document.querySelector(".box").innerHTML =
    "<h1>Yaaay 😍</h1><p>Ami jantam amar baby amake bhalobashe ❤️</p>";
}

let noBtn = document.getElementById("no");
noBtn.addEventListener("mouseover", function(){
    noBtn.style.position="absolute";
    noBtn.style.left=Math.random()*80+"%";
    noBtn.style.top=Math.random()*80+"%";
});

</script>

</body>
      </html>
